<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AIRemoteCtl</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>AIRemoteCtl</h1>
          <p id="status">连接中</p>
        </div>
        <button id="connectBtn" type="button">连接</button>
      </header>

      <section class="panel composer">
        <label for="prompt">发送给 Codex</label>
        <textarea id="prompt" rows="5" placeholder="输入任务，例如：分析当前项目并给出改造建议"></textarea>
        <div class="controls">
          <input id="threadId" placeholder="线程 ID，可留空新建" />
          <select id="approvalPolicy">
            <option value="on-request">按需审批</option>
            <option value="on-failure">失败后审批</option>
            <option value="never">自动执行</option>
          </select>
        </div>
        <button id="sendBtn" class="primary" type="button">发送</button>
      </section>

      <section id="approvalPanel" class="panel hidden">
        <h2>待审批</h2>
        <div id="approvals"></div>
      </section>

      <section class="panel">
        <h2>会话</h2>
        <div id="conversationList" class="conversation-list"></div>
      </section>

      <section class="panel">
        <h2>事件</h2>
        <pre id="events"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
